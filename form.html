<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form | Ernesto Zeledon - WDD 131</title>
    <meta name="author" content="Ernesto Zeledon">
    <meta name="description"
        content="Ernesto Zeledon's BYU-Idaho WDD 131 - Dynamic Web Fundamentals, Week 05 Assignment: Product Review Form.">
    <link rel="stylesheet" href="styles/form-review-base.css">
    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/form.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form action="review.html" method="get" id="pr-form">
            <label>Product Name
                <select name="productName" id="product-name" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </label>

            <div class="input-container">Overall Rating
                <div id="star-rating">
                    <label><input type="radio" name="rating" value="5" id="star-five" required></label>
                    <label><input type="radio" name="rating" value="4" id="star-four" required></label>
                    <label><input type="radio" name="rating" value="3" id="star-three" required></label>
                    <label><input type="radio" name="rating" value="2" id="star-two" required></label>
                    <label><input type="radio" name="rating" value="1" id="star-one" required></label>
                </div>
            </div>

            <label>Date of Installation<input type="date" name="installDate" id="install-date" required></label>

            <div id="liked-features">
                <div>Which feature did you find useful in the product?<span class="italic-font">(Check all that
                        apply)</span></div>
                <label><input type="checkbox" name="durability" value="yes" id="feat-dur">Durability</label>
                <label><input type="checkbox" name="easeOfUse" value="yes" id="feat-ease">Ease of Use</label>
                <label><input type="checkbox" name="performance" value="yes" id="feat-per">Performance</label>
                <label><input type="checkbox" name="design" value="yes" id="feat-desi">Design</label>
            </div>

            <label>Written Review<span class="optional-text-hint">(Optional)</span><textarea name="writtenReview"
                    id="written-review"></textarea></label>

            <label>Your Name<span class="optional-text-hint">(Optional)</span><input type="text"
                    name="reviewerName"></label>

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy;<span id="currentYear"></span> &#10070; Ernesto Zeledon | El Salvador &#10070;</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
